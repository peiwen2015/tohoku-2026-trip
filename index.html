    .leaflet-popup-content-wrapper {
      background: rgba(30, 41, 59, 0.95) !important;

      color: #f8fafc !important;

      padding: 0 !important;

    }
    .leaflet-popup-content {
      margin: 0 !important;
      width: 300px !important;
    }
    .leaflet-popup-tip {
      background: rgba(30, 41, 59, 0.95) !important;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .leaflet-container a.leaflet-popup-close-button {
      color: #94a3b8 !important;
      padding: 8px !important;
    }

      color: #f1f5f9 !important;
    }
    
    /* 路線虛線流動特效 */
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    .flow-line {
      stroke-dasharray: 10, 10;
      animation: dash 1.5s linear infinite;
    }

      width: 6px;
      height: 6px;
    }

    }

<body class="bg-slate-950 text-slate-100 overflow-hidden h-screen flex flex-col">

          <span>互動行程表</span>

          <span>原始行程圖檔</span>

          <button onclick="filterDay(5)" class="day-filter-btn py-1 px-2 text-center rounded text-xs font-semibold border transition border-slate-800 bg-slate-800 text-slate-400">D5</button>

        </div>
      </div>

            <img src="1_2.jpg" alt="Original 1" class="w-full h-32 object-cover opacity-85 group-hover:scale-105 transition duration-300" onerror="this.src='https://placehold.co/400x300/1e293b/94a3b8?text=1_2.jpg'">
            <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-slate-950 p-2 text-xs">完美行程簡介</div>
          </div>
          <div class="group relative cursor-pointer border border-slate-800 rounded-lg overflow-hidden shadow-md bg-slate-950 hover:border-slate-600 transition" onclick="openLightbox('2_2.jpg', '第二張：Day 1 行程規劃')">
            <img src="2_2.jpg" alt="Original 2" class="w-full h-32 object-cover opacity-85 group-hover:scale-105 transition duration-300" onerror="this.src='https://placehold.co/400x300/1e293b/94a3b8?text=2_2.jpg'">
            <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-slate-950 p-2 text-xs">Day 1 行程</div>
          </div>
          <div class="group relative cursor-pointer border border-slate-800 rounded-lg overflow-hidden shadow-md bg-slate-950 hover:border-slate-600 transition" onclick="openLightbox('3_2.jpg', '第三張：Day 2 行程規劃')">
            <img src="3_2.jpg" alt="Original 3" class="w-full h-32 object-cover opacity-85 group-hover:scale-105 transition duration-300" onerror="this.src='https://placehold.co/400x300/1e293b/94a3b8?text=3_2.jpg'">

          </div>

            <img src="5_2.jpg" alt="Original 5" class="w-full h-32 object-cover opacity-85 group-hover:scale-105 transition duration-300" onerror="this.src='https://placehold.co/400x300/1e293b/94a3b8?text=5_2.jpg'">
            <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-slate-950 p-2 text-xs">Day 4 行程</div>
          </div>

    </div>
  </main>

    let map;
    let markersList = [];
    let polylineList = [];
    let currentFilteredDay = null; // null 表示顯示全部

    function initMap() {
      // 預設將地圖中心定位於福島與宮城交界帶
      map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: true
      }).setView([37.6, 140.4], 9);

      // 使用 CartoDB Voyager 底圖，對跨語系標籤支援度最好、配色舒適
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      // 新增縮放控制按鈕在左下角
      L.control.zoom({
        position: 'bottomleft'
      }).addTo(map);

      renderItineraryData();
      renderMapElements();
      zoomToFitAll();
    }

    function renderItineraryData() {
      const timelineContainer = document.getElementById('itinerary-timeline');
      timelineContainer.innerHTML = '';

      itineraryData.forEach((dayData, dIdx) => {
        // 天數區塊頭
        const dayHeader = document.createElement('div');
        dayHeader.className = `day-block-header mb-4 mt-6 first:mt-0 ${currentFilteredDay && currentFilteredDay !== dayData.day ? 'hidden' : ''}`;
        dayHeader.innerHTML = `
          <div class="flex items-center space-x-2.5 -ml-[33px]">
            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white shadow-md" style="background-color: ${dayData.color}; box-shadow: 0 4px 10px ${dayData.color}50">
              ${dayData.day}
            </div>
            <div>
              <span class="text-xs font-bold tracking-wider" style="color: ${dayData.color}">${dayData.dayLabel}</span>
              <h3 class="text-sm font-bold text-slate-100">${dayData.title}</h3>
            </div>
          </div>
        `;
        timelineContainer.appendChild(dayHeader);

        // 該天的景點列表
        dayData.spots.forEach((spot, sIdx) => {
          const spotEl = document.createElement('div');
          spotEl.className = `group relative pl-4 pb-6 border-l border-slate-800/80 last:border-0 ${currentFilteredDay && currentFilteredDay !== dayData.day ? 'hidden' : ''}`;
          spotEl.innerHTML = `
            <div class="absolute w-3 h-3 rounded-full -left-[22px] top-1.5 border-2 border-slate-900 group-hover:scale-125 transition" style="background-color: ${dayData.color}"></div>
            <div class="bg-slate-800/40 hover:bg-slate-800/80 border border-slate-800/80 hover:border-slate-700/50 p-3.5 rounded-xl transition duration-200 cursor-pointer shadow" onclick="focusSpot(${dIdx}, ${sIdx})">
              <div class="flex justify-between items-start mb-1.5">
                <span class="text-xs font-bold text-slate-400 flex items-center">
                  <i data-lucide="clock" class="w-3.5 h-3.5 mr-1 text-slate-500"></i>
                  ${spot.time}
                </span>
                <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full text-white/90" style="background-color: ${dayData.color}30, color: ${dayData.color}">
                  順序 ${sIdx + 1}
                </span>
              </div>
              <h4 class="text-sm font-bold text-white group-hover:text-teal-400 transition mb-1">${spot.name}</h4>
              <p class="text-xs text-slate-400 line-clamp-2 leading-relaxed">${spot.desc}</p>
            </div>
          `;
          timelineContainer.appendChild(spotEl);
        });
      });
      
      // 重新啟用新生成元素的 Lucide 圖示
      lucide.createIcons();
    }

    function renderMapElements() {
      // 清空先前的 Marker 和 Polyline
      markersList.forEach(m => map.removeLayer(m));
      polylineList.forEach(p => map.removeLayer(p));
      markersList = [];
      polylineList = [];

      itineraryData.forEach((dayData, dIdx) => {
        // 若選擇了特定天數，且不符合，則跳過地圖繪製
        if (currentFilteredDay && currentFilteredDay !== dayData.day) return;

        const latlngs = [];

        dayData.spots.forEach((spot, sIdx) => {
          // 建立自訂的 CSS 樣式 Marker 圖示
          const iconHtml = `
            <div class="relative flex items-center justify-center w-8 h-8 rounded-full border-2 border-slate-900 text-white font-bold text-xs shadow-lg transition-transform hover:scale-110" 
                 style="background: radial-gradient(circle at 30% 30%, ${dayData.color}bb, ${dayData.color}); box-shadow: 0 4px 10px ${dayData.color}60">
              ${sIdx + 1}
              <div class="absolute -bottom-1 w-2 h-2 rotate-45 border-r border-b border-slate-900" style="background-color: ${dayData.color}"></div>
            </div>
          `;

          const customIcon = L.divIcon({
            html: iconHtml,
            className: 'custom-div-icon',
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
          });

          // 彈出視窗（Popup）客製化：照片、大標、敘述
          const popupContent = `
            <div class="flex flex-col overflow-hidden rounded-xl">
              <div class="relative h-36 w-full overflow-hidden bg-slate-800">
                <img src="${spot.image}" alt="${spot.name}" class="w-full h-full object-cover transition duration-300 hover:scale-105" onerror="this.src='https://placehold.co/400x300/1e293b/94a3b8?text=${encodeURIComponent(spot.name)}'">
                <div class="absolute top-2 left-2 px-2.5 py-0.5 rounded-full text-[10px] font-bold text-white shadow" style="background-color: ${dayData.color}">
                  Day ${dayData.day} - 順序 ${sIdx + 1}
                </div>
                <div class="absolute bottom-2 right-2 px-2 py-0.5 rounded bg-slate-950/80 backdrop-blur text-[10px] text-slate-300">
                  🕒 ${spot.time} 預定
                </div>
              </div>
              <div class="p-3 bg-slate-900">
                <h3 class="text-sm font-bold text-slate-100 mb-1 flex items-center">
                  <span class="w-2 h-2 rounded-full mr-2" style="background-color: ${dayData.color}"></span>
                  ${spot.name}
                </h3>
                <p class="text-xs text-slate-300 leading-relaxed mb-2">${spot.desc}</p>
                <div class="border-t border-slate-800 pt-2 text-[10px] text-slate-400 leading-normal italic">
                  🔍 ${spot.detail}
                </div>
              </div>
            </div>
          `;

          // 建立地圖 Marker
          const marker = L.marker([spot.lat, spot.lng], { icon: customIcon }).addTo(map);
          marker.bindPopup(popupContent, { maxWidth: 300 });

          // 滑鼠移到景點時就自動跳出景點說明（自動開啟 Popup）
          marker.on('mouseover', function () {
            this.openPopup();
          });

          // 將 Marker 快取起來
          markersList.push(marker);
          latlngs.push([spot.lat, spot.lng]);

          // 把 marker 綁定在資料結構上，方便點擊左側時可以飛過來並開啟
          spot.markerInstance = marker;
        });

        // 繪製前進路線：Day 內部連線 (動態流動效果虛線)
        if (latlngs.length > 1) {
          const pathLine = L.polyline(latlngs, {
            color: dayData.color,
            weight: 4,
            opacity: 0.85,
            className: 'flow-line'
          }).addTo(map);
          polylineList.push(pathLine);
        }
      });
    }

    function focusSpot(dayIdx, spotIdx) {
      const spot = itineraryData[dayIdx].spots[spotIdx];
      if (spot) {
        map.flyTo([spot.lat, spot.lng], 13, {
          animate: true,
          duration: 1.2
        });
        
        // 延遲一下等飛行動畫完成後開啟 Popup
        setTimeout(() => {
          if (spot.markerInstance) {
            spot.markerInstance.openPopup();
          }
        }, 1200);
      }
    }

    // 將視角完美框住所有現有景點
    function zoomToFitAll() {
      const activeLatLngs = [];
      itineraryData.forEach(dayData => {
        if (currentFilteredDay && currentFilteredDay !== dayData.day) return;
        dayData.spots.forEach(spot => {
          activeLatLngs.push([spot.lat, spot.lng]);
        });
      });

      if (activeLatLngs.length > 0) {
        map.fitBounds(activeLatLngs, {
          padding: [50, 50],
          maxZoom: 12,
          animate: true,
          duration: 1
        });
      }
    }

    // 依天數過濾顯示
    function filterDay(dayNum) {
      const buttons = document.querySelectorAll('.day-filter-btn');
      buttons.forEach((btn, idx) => {
        const targetDay = idx + 1;
        if (targetDay === dayNum) {
          // 如果點擊了已經選中的天數，則重置，否則切換
          if (currentFilteredDay === dayNum) {
            currentFilteredDay = null;
            btn.className = "day-filter-btn py-1 px-2 text-center rounded text-xs font-semibold border transition border-slate-800 bg-slate-800 text-slate-400";
          } else {
            currentFilteredDay = dayNum;
            const activeColor = itineraryData[dayNum-1].color;
            btn.style.borderColor = activeColor;
            btn.className = `day-filter-btn py-1 px-2 text-center rounded text-xs font-semibold border transition text-white`;
            btn.style.backgroundColor = `${activeColor}40`;
            btn.style.borderColor = activeColor;
          }
        } else {
          btn.className = "day-filter-btn py-1 px-2 text-center rounded text-xs font-semibold border transition border-slate-800 bg-slate-800 text-slate-400";
          btn.style.backgroundColor = '';
          btn.style.borderColor = '';
        }
      });

      // 重新渲染畫面與地圖
      renderItineraryData();
      renderMapElements();
      zoomToFitAll();
    }

    // 切換側邊欄分頁 (互動行程表 vs 原始行程圖檔)
    function switchTab(tab) {
      const btnItinerary = document.getElementById('btn-itinerary');
      const btnRaw = document.getElementById('btn-raw');
      const tabItineraryContent = document.getElementById('tab-itinerary-content');
      const tabRawContent = document.getElementById('tab-raw-content');

      if (tab === 'itinerary') {
        btnItinerary.className = "flex-1 py-2 px-3 text-sm font-medium rounded-md transition duration-200 bg-slate-800 text-teal-400 border border-slate-700/50 flex items-center justify-center space-x-2";
        btnRaw.className = "flex-1 py-2 px-3 text-sm font-medium rounded-md transition duration-200 text-slate-400 hover:bg-slate-900 hover:text-slate-200 flex items-center justify-center space-x-2";
        tabItineraryContent.classList.remove('hidden');
        tabRawContent.classList.add('hidden');
      } else {
        btnRaw.className = "flex-1 py-2 px-3 text-sm font-medium rounded-md transition duration-200 bg-slate-800 text-teal-400 border border-slate-700/50 flex items-center justify-center space-x-2";
        btnItinerary.className = "flex-1 py-2 px-3 text-sm font-medium rounded-md transition duration-200 text-slate-400 hover:bg-slate-900 hover:text-slate-200 flex items-center justify-center space-x-2";
        tabRawContent.classList.remove('hidden');
        tabItineraryContent.classList.add('hidden');
      }
    }

    // 放大燈箱查看原始大圖
    function openLightbox(imgSrc, caption) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxCaption = document.getElementById('lightbox-caption');
      
      lightboxImg.src = imgSrc;
      lightboxCaption.textContent = caption;
      lightbox.classList.remove('hidden');
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.add('hidden');
    }

    // 網頁載入後立刻執行初始化
    window.onload = function () {
      initMap();
    };
  </script>
